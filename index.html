<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта Дня - Мотивация и Вдохновение</title>
    <meta name="description" content="Получи своё мотивирующее послание на сегодня">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="imgs/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Marck+Script&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
            position: relative;
        }

        /* Звёзды и частицы */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        .shooting-star {
            position: absolute;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,1));
            animation: shooting 3s linear infinite;
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        @keyframes shooting {
            0% { transform: translateX(-100px) translateY(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateX(calc(100vw + 100px)) translateY(100px); opacity: 0; }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            z-index: 1;
            padding: 20px;
            max-width: 100%;
        }

        h1 {
            font-family: 'Marck Script', cursive;
            font-size: 3rem;
            color: #f8e5d0;
            text-shadow: 0 0 20px rgba(255, 215, 150, 0.5);
            text-align: center;
        }

        /* Категории */
        .categories {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 350px;
        }

        .category-btn {
            padding: 8px 16px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.95rem;
            color: rgba(248, 229, 208, 0.8);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(248, 229, 208, 0.3);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-btn:hover, .category-btn.active {
            background: rgba(255, 215, 150, 0.2);
            border-color: rgba(255, 215, 150, 0.6);
            color: #f8e5d0;
            transform: scale(1.05);
        }

        .category-btn.active {
            box-shadow: 0 0 15px rgba(255, 215, 150, 0.3);
        }

        /* Контейнер карты */
        .card-container {
            perspective: 1500px;
            width: 300px;
            height: 450px;
            cursor: pointer;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0.0, 0.2, 1);
            border-radius: 15px;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.4),
                0 0 40px rgba(255, 200, 150, 0.2);
            overflow: hidden;
        }

        .card-back {
            background: linear-gradient(135deg, #e8c5e5 0%, #d4a5d9 50%, #c898c5 100%);
        }

        .card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-front {
            transform: rotateY(180deg);
            background: linear-gradient(145deg, #fef9f3 0%, #fdf0e0 50%, #fce8d5 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 25px;
            border: 3px solid #d4a574;
        }

        .card-front::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 2px solid rgba(212, 165, 116, 0.4);
            border-radius: 10px;
            pointer-events: none;
        }

        .category-icon {
            font-size: 50px;
            margin-bottom: 15px;
            animation: glow 2s infinite;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(255, 200, 100, 0.6)); }
            50% { filter: drop-shadow(0 0 25px rgba(255, 200, 100, 0.9)); }
        }

        .wish-text {
            font-size: 1.3rem;
            color: #5a4a3a;
            text-align: center;
            line-height: 1.6;
            font-weight: 600;
            flex-grow: 1;
            display: flex;
            align-items: center;
        }

        .divider {
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4a574, transparent);
            margin: 15px 0;
        }

        .card-footer {
            font-family: 'Marck Script', cursive;
            font-size: 1.1rem;
            color: #8a7a6a;
        }

        /* Кнопки */
        .buttons-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .draw-btn {
            padding: 16px 40px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: #5a4a3a;
            background: linear-gradient(145deg, #f8e5d0 0%, #e8c9a8 100%);
            border: 2px solid #d4a574;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .draw-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: rotate(45deg);
            transition: all 0.5s ease;
            opacity: 0;
        }

        .draw-btn:hover::before {
            opacity: 1;
            left: 100%;
        }

        .draw-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
        }

        .icon-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(248, 229, 208, 0.4);
            background: rgba(255, 255, 255, 0.1);
            color: #f8e5d0;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: rgba(255, 215, 150, 0.2);
            border-color: rgba(255, 215, 150, 0.6);
            transform: scale(1.1);
        }

        .instruction {
            color: rgba(248, 229, 208, 0.7);
            font-size: 0.95rem;
            text-align: center;
            max-width: 300px;
        }

        /* История */
        .history-panel {
            position: fixed;
            top: 0;
            right: -350px;
            width: 350px;
            max-width: 90vw;
            height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            border-left: 2px solid rgba(248, 229, 208, 0.2);
            z-index: 100;
            transition: right 0.3s ease;
            padding: 20px;
            overflow-y: auto;
        }

        .history-panel.open {
            right: 0;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(248, 229, 208, 0.2);
        }

        .history-header h2 {
            font-family: 'Marck Script', cursive;
            color: #f8e5d0;
            font-size: 1.8rem;
        }

        .close-btn {
            background: none;
            border: none;
            color: #f8e5d0;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .close-btn:hover {
            opacity: 1;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid rgba(248, 229, 208, 0.1);
        }

        .history-date {
            font-size: 0.8rem;
            color: rgba(248, 229, 208, 0.5);
            margin-bottom: 5px;
        }

        .history-category {
            font-size: 0.9rem;
            color: rgba(255, 215, 150, 0.8);
            margin-bottom: 8px;
        }

        .history-text {
            color: rgba(248, 229, 208, 0.9);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .history-empty {
            text-align: center;
            color: rgba(248, 229, 208, 0.5);
            padding: 40px 20px;
        }

        /* Эффекты */
        .sparkle, .particle {
            position: fixed;
            pointer-events: none;
            z-index: 50;
        }

        .sparkle {
            animation: sparkle-fade 0.8s ease-out forwards;
        }

        .particle {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: particle-fly 1s ease-out forwards;
        }

        @keyframes sparkle-fade {
            0% { opacity: 1; transform: scale(0) rotate(0deg); }
            50% { opacity: 1; transform: scale(1) rotate(180deg); }
            100% { opacity: 0; transform: scale(0.5) rotate(360deg); }
        }

        @keyframes particle-fly {
            0% { opacity: 1; transform: scale(1) translate(0, 0); }
            100% { opacity: 0; transform: scale(0) translate(var(--tx), var(--ty)); }
        }

        /* Overlay для панели */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Адаптивность */
        @media (max-width: 400px) {
            .card-container {
                width: 280px;
                height: 420px;
            }
            h1 { font-size: 2.2rem; }
            .wish-text { font-size: 1.15rem; }
            .categories { gap: 8px; }
            .category-btn { padding: 6px 12px; font-size: 0.85rem; }
        }

        /* PWA Install Banner */
        .install-banner {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(145deg, #f8e5d0 0%, #e8c9a8 100%);
            padding: 12px 25px;
            border-radius: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 200;
            display: none;
            align-items: center;
            gap: 15px;
        }

        .install-banner.show { display: flex; }

        .install-banner span { color: #5a4a3a; font-weight: 600; }

        .install-banner button {
            padding: 8px 20px;
            background: #5a4a3a;
            color: #f8e5d0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
        }
    </style>
</head>
